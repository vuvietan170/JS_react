<!DOCTYPE html>
<html>
    <head>
        <title>YouTube Stolen</title>
        <link rel="stylesheet" href="/style/header.css">
        <link rel="stylesheet" href="/style/sidebar.css">
        <link rel="stylesheet" href="style/general.css">
    </head>
    
     <body>
    <header class="header">
      <div class="left-section">
        <img class="hamburger-menu" src="/asset/hamburger-menu.svg">
        <img class="youtube-logo" src="/asset/youtube-logo.svg">
      </div>
      <div class="middle-section">
        <input class="search-bar" type="text" placeholder="Search">
        <button class="search-button">
          <img class="search-icon" src="/asset/search.svg">
          <div class="tooltip">Search</div>
        </button>
        <!-- Put position absolute inside position relative -->
        <button class="voice-search-button">
          <img class="voice-search-icon" src="/asset/voice-search-icon.svg">
          <div class="tooltip">Search with your voice</div>
        </button>
      </div>
      <div class="right-section">
        <div class="upload-icon-container">
          <img class="upload-icon" src="/asset/upload.svg">
          <div class="tooltip">Create</div>
        </div>
        <img class="youtube-apps-icon" src="/asset/youtube-apps.svg">
        <div class="notifications-icon-container">
          <img class="notifications-icon" src="/asset/notifications.svg">
          <div class="notifications-count">3</div>
        </div>
        <img class="current-user-picture" src="/asset/channel-pictures/my-channel.jpeg">
      </div>
    </header>

    <nav class="sidebar">
      <div class="sidebar-link">
        <img src="/asset/home.svg">
        <div>Home</div>
      </div>
      <div class="sidebar-link">
        <img src="/asset/explore.svg">
        <div>Explore</div>
      </div>
      <div class="sidebar-link">
        <img src="/asset/subscriptions.svg">
        <div>Subscriptions</div>
      </div>
      <div class="sidebar-link">
        <img src="/asset/originals.svg">
        <div>Originals</div>
      </div>
      <div class="sidebar-link">
        <img src="/asset/youtube-music.svg">
        <div>YouTube Music</div>
      </div>
      <div class="sidebar-link">
        <img src="/asset/library.svg">
        <div>Library</div>
      </div>
    </nav>
    
    </body>
</html>
